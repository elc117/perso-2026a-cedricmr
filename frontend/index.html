<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Treinos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-4xl font-bold">Diário de Treinos</h1>
            <p class="text-gray-400 mt-2">Acompanhe sua evolução na academia</p>
        </header>

        <main>
            <section class="mb-8 bg-gray-800 p-6 rounded-lg">
                <h2 class="text-2xl font-semibold mb-4">Novo Treino</h2>
                <div class="space-y-3">
                    <input id="input-data" type="date" class="w-full bg-gray-700 p-2 rounded text-white">
                    <input id="input-grupo" type="text" placeholder="Grupo muscular (ex: Peito)" class="w-full bg-gray-700 p-2 rounded text-white">
                    <input id="input-obs" type="text" placeholder="Observação (opcional)" class="w-full bg-gray-700 p-2 rounded text-white">
                    <button onclick="adicionarTreino()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-semibold">
                        Adicionar Treino
                    </button>
                </div>
            </section>

            <section class="mb-8 bg-gray-800 p-6 rounded-lg">
                <h2 class="text-2xl font-semibold mb-4">Estatísticas</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-2">Recordes</h3>
                        <div id="recordes" class="space-y-2">Carregando...</div>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-2">Frequência por grupo</h3>
                        <div id="frequencia" class="space-y-2">Carregando...</div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-semibold mb-2">Evolução de carga</h3>
                    <input id="input-evolucao" type="text" placeholder="Nome do exercício" class="w-full bg-gray-700 p-2 rounded mb-2">
                    <button onclick="carregarEvolucao()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded mb-3">Ver evolução</button>
                    <canvas id="grafico-evolucao"></canvas>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="text-2xl font-semibold mb-4">Meus Treinos</h2>
                <div id="lista-treinos" class="space-y-3">
                    Carregando...
                </div>
            </section>
        </main>
    </div>

    <script>
        async function carregarTreinos() {
            const resposta = await fetch('http://localhost:3000/treinos');
            const treinos = await resposta.json();
            const lista = document.getElementById('lista-treinos');

            if (treinos.length === 0) {
                lista.innerHTML = '<p class="text-gray-400">Nenhum treino registrado ainda.</p>';
                return;
            }

            const treinosHtml = await Promise.all(treinos.map(async t => {
                const respEx = await fetch(`http://localhost:3000/treinos/${t.treinoId}/exercicios`);
                const exercicios = await respEx.json();

                const exerciciosHtml = exercicios.length === 0
                    ? '<p class="text-gray-500 text-sm italic">Nenhum exercício</p>'
                    : exercicios.map(e => `
                        <div class="bg-gray-700 p-2 rounded text-sm">
                            <strong>${e.nomeExercicio}</strong> — ${e.series}x${e.repeticoes} com ${e.cargaKg}kg
                        </div>
                    `).join('');

                return `
                    <div class="bg-gray-800 p-4 rounded-lg">
                        <h3 class="text-lg font-semibold">${t.grupoMuscular}</h3>
                        <p class="text-gray-400">${t.data_}</p>
                        <p class="text-sm mt-2 mb-3">${t.observacao || 'Sem observações'}</p>
                        <div class="space-y-2 mb-3">${exerciciosHtml}</div>
                        <button onclick="abrirFormExercicio(${t.treinoId})" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm">
                            + Exercício
                        </button>
                        <div id="form-ex-${t.treinoId}" class="hidden mt-3 space-y-2">
                            <input id="ex-nome-${t.treinoId}" type="text" placeholder="Nome do exercício" class="w-full bg-gray-700 p-2 rounded">
                            <input id="ex-series-${t.treinoId}" type="number" placeholder="Séries" class="w-full bg-gray-700 p-2 rounded">
                            <input id="ex-reps-${t.treinoId}" type="number" placeholder="Repetições" class="w-full bg-gray-700 p-2 rounded">
                            <input id="ex-carga-${t.treinoId}" type="number" step="0.5" placeholder="Carga (kg)" class="w-full bg-gray-700 p-2 rounded">
                            <button onclick="adicionarExercicio(${t.treinoId})" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded">Salvar Exercício</button>
                        </div>
                    </div>
                `;
            }));

            lista.innerHTML = treinosHtml.join('');
        }

        function abrirFormExercicio(tid) {
            document.getElementById(`form-ex-${tid}`).classList.toggle('hidden');
        }

        async function adicionarTreino() {
            const data = document.getElementById('input-data').value;
            const grupo = document.getElementById('input-grupo').value;
            const obs = document.getElementById('input-obs').value;

            if (!data || !grupo) {
                alert('Preencha data e grupo muscular');
                return;
            }

            await fetch('http://localhost:3000/treinos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    treinoId: 0,
                    data_: data,
                    grupoMuscular: grupo,
                    observacao: obs
                })
            });

            document.getElementById('input-data').value = '';
            document.getElementById('input-grupo').value = '';
            document.getElementById('input-obs').value = '';
            carregarTreinos();
            carregarRecordes();
            carregarFrequencia();
        }

        async function adicionarExercicio(tid) {
            const nome = document.getElementById(`ex-nome-${tid}`).value;
            const series = parseInt(document.getElementById(`ex-series-${tid}`).value);
            const reps = parseInt(document.getElementById(`ex-reps-${tid}`).value);
            const carga = parseFloat(document.getElementById(`ex-carga-${tid}`).value);

            if (!nome || !series || !reps || isNaN(carga)) {
                alert('Preencha todos os campos do exercício');
                return;
            }

            await fetch(`http://localhost:3000/treinos/${tid}/exercicios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    exercicioId: 0,
                    treinoIdRef: tid,
                    nomeExercicio: nome,
                    series: series,
                    repeticoes: reps,
                    cargaKg: carga
                })
            });

            carregarTreinos();
            carregarRecordes();
        }

        async function carregarRecordes() {
            const resp = await fetch('http://localhost:3000/stats/recordes');
            const dados = await resp.json();
            const div = document.getElementById('recordes');
            div.innerHTML = dados.length === 0
                ? '<p class="text-gray-500">Nenhum recorde ainda</p>'
                : dados.map(([nome, carga]) => `
                    <div class="bg-gray-700 p-2 rounded">${nome}: <strong>${carga}kg</strong></div>
                `).join('');
        }

        async function carregarFrequencia() {
            const resp = await fetch('http://localhost:3000/stats/frequencia');
            const dados = await resp.json();
            const div = document.getElementById('frequencia');
            div.innerHTML = dados.length === 0
                ? '<p class="text-gray-500">Sem dados ainda</p>'
                : dados.map(([grupo, qtd]) => `
                    <div class="bg-gray-700 p-2 rounded">${grupo}: <strong>${qtd} treino(s)</strong></div>
                `).join('');
        }

        let graficoEvolucao = null;
        async function carregarEvolucao() {
            const nome = document.getElementById('input-evolucao').value;
            if (!nome) {
                alert('Digite o nome do exercício');
                return;
            }
            const resp = await fetch(`http://localhost:3000/exercicios/${nome}/evolucao`);
            const cargas = await resp.json();

            if (graficoEvolucao) graficoEvolucao.destroy();

            const ctx = document.getElementById('grafico-evolucao').getContext('2d');
            graficoEvolucao = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: cargas.map((_, i) => `Treino ${i + 1}`),
                    datasets: [{
                        label: `Carga - ${nome}`,
                        data: cargas,
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        carregarTreinos();
        carregarRecordes();
        carregarFrequencia();
    </script>
</body>
</html>
